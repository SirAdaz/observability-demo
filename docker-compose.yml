services:
  tooling:
    build:
      context: ./docker
    image: observability-demo-tooling:latest
    network_mode: host
    working_dir: /workspace
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      KUBECONFIG: /workspace/.kube/config
      KIND_CLUSTER_NAME: observability-demo
    stdin_open: true
    tty: true
